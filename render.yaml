services:
  - type: web
    name: trade-stag
    runtime: python
    buildCommand: |
      cd frontend && npm install && REACT_APP_API_URL="" npm run build && cp -r build ../backend/static && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: NODE_VERSION
        value: "20.11.0"
      - key: JWT_SECRET
        generateValue: true
    plan: free
